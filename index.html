<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tu Bandeja</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bandeja" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React UMD (no modules, no imports) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body { margin: 0; background: #fafaf9; }
    #root { 
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom); 
    }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  (function() {
    'use strict';

    const e = React.createElement;
    const { useState, useEffect, useRef } = React;

    const CATEGORIES = {
      trabajo:  { label: 'Trabajo',  emoji: '💼', chip: 'bg-teal-50 text-teal-800 border-teal-200' },
      finanzas: { label: 'Finanzas', emoji: '💰', chip: 'bg-amber-50 text-amber-800 border-amber-200' },
      personal: { label: 'Personal', emoji: '🏠', chip: 'bg-rose-50 text-rose-800 border-rose-200' },
    };

    function toISODate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function startOfDay(d) {
      const x = new Date(d);
      x.setHours(0, 0, 0, 0);
      return x;
    }

    function fallbackClassify(text) {
      const t = text.toLowerCase();
      const finanzasWords = ['pagar','pago','pague','pagué','cobrar','cobre','cobré','renta','luz','agua','internet','tarjeta','banco','deposito','depósito','nomina','nómina','recibo','factura','gasolina','pesos','$'];
      const trabajoWords = ['auditoria','auditoría','formulario','reporte','cliente','reunion','reunión','junta','equipo','campo','seguimiento','entrega','jefe','oficina','proyecto','presentacion','presentación'];
      let category = 'personal';
      if (finanzasWords.some(w => t.includes(w))) category = 'finanzas';
      else if (trabajoWords.some(w => t.includes(w))) category = 'trabajo';
      const amountMatch = t.match(/\$?\s?(\d[\d,.]*)\s?(pesos|mxn)?/);
      const amount = amountMatch && /\d/.test(amountMatch[1]) ? parseFloat(amountMatch[1].replace(/,/g, '')) : null;
      let dueDate = null;
      const today = startOfDay(new Date());
      if (t.includes('hoy')) { dueDate = toISODate(today); }
      else if (t.includes('pasado manana') || t.includes('pasado mañana')) { const d = new Date(today); d.setDate(d.getDate()+2); dueDate = toISODate(d); }
      else if (t.includes('manana') || t.includes('mañana')) { const d = new Date(today); d.setDate(d.getDate()+1); dueDate = toISODate(d); }
      else {
        const map = { domingo:0, lunes:1, martes:2, miercoles:3, 'miércoles':3, jueves:4, viernes:5, sabado:6, 'sábado':6 };
        const found = Object.keys(map).find(d => t.includes(d));
        if (found) {
          const target = map[found]; const d = new Date(today);
          let diff = (target - d.getDay() + 7) % 7; if (diff === 0) diff = 7;
          d.setDate(d.getDate() + diff); dueDate = toISODate(d);
        }
      }
      let urgency = 'baja';
      if (dueDate) {
        const diffDays = Math.round((new Date(dueDate+'T00:00:00') - today) / 86400000);
        if (diffDays <= 1) urgency = 'alta'; else if (diffDays <= 3) urgency = 'media';
      }
      return { category, title: text.length > 60 ? text.slice(0,57)+'...' : text, dueDate, amount, type: category==='finanzas' ? (t.includes('cobr') ? 'ingreso' : 'gasto') : null, urgency };
    }

    async function classifyWithAI(text, todayISO) {
      const system = `Eres un clasificador. Responde SOLO con JSON valido, sin texto adicional, sin markdown ni backticks. Hoy es ${todayISO}. Dado un texto breve en español que alguien escribió como pendiente, devuelve JSON con estos campos exactos: category (uno de: "trabajo", "finanzas", "personal"), title (version corta, maximo 8 palabras, en español, conservando el verbo de accion), dueDate (string YYYY-MM-DD si se menciona o se puede inferir una fecha limite, si no null), amount (numero si se menciona una cantidad en pesos, si no null), type (solo si category es "finanzas": "gasto" o "ingreso", si no null), urgency ("alta", "media" o "baja" segun que tan cerca esta dueDate de hoy, "baja" si no hay fecha).`;
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 300, system, messages: [{ role: 'user', content: text }] }),
      });
      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('').trim();
      const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
      if (!parsed.category) throw new Error('incompleto');
      return parsed;
    }

    const storage = {
      get: async (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; } },
      set: async (key, value) => { try { localStorage.setItem(key, value); return true; } catch { return null; } },
    };

    function App() {
      const [items, setItems] = useState([]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('todos');
      const [busy, setBusy] = useState(false);
      const [loaded, setLoaded] = useState(false);
      const [showDone, setShowDone] = useState(false);
      const [editingId, setEditingId] = useState(null);
      const [editText, setEditText] = useState('');
      const [editBusy, setEditBusy] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await storage.get('inbox:items');
            if (res && res.value) setItems(JSON.parse(res.value));
          } catch(err) {}
          setLoaded(true);
        })();
      }, []);

      async function persist(next) {
        setItems(next);
        try { await storage.set('inbox:items', JSON.stringify(next)); } catch(err) {}
      }

      async function addItem() {
        const text = input.trim();
        if (!text || busy) return;
        setBusy(true); setInput('');
        const today = toISODate(startOfDay(new Date()));
        let meta;
        try { meta = await classifyWithAI(text, today); } catch(err) { meta = fallbackClassify(text); }
        const newItem = {
          id: Date.now().toString(), text, done: false, createdAt: new Date().toISOString(),
          category: meta.category || 'personal', title: meta.title || text,
          dueDate: meta.dueDate || null, amount: meta.amount != null ? meta.amount : null,
          type: meta.type || null, urgency: meta.urgency || 'baja',
        };
        await persist([newItem, ...items]);
        setBusy(false);
        if (inputRef.current) inputRef.current.focus();
      }

      function toggleDone(id) { persist(items.map(it => it.id === id ? { ...it, done: !it.done } : it)); }
      function removeItem(id) { persist(items.filter(it => it.id !== id)); }
      function startEdit(item) { setEditingId(item.id); setEditText(item.text); }
      function cancelEdit() { setEditingId(null); setEditText(''); }

      async function saveEdit(id) {
        const text = editText.trim();
        if (!text) return cancelEdit();
        setEditBusy(true);
        const today = toISODate(startOfDay(new Date()));
        let meta;
        try { meta = await classifyWithAI(text, today); } catch(err) { meta = fallbackClassify(text); }
        await persist(items.map(it => it.id === id ? {
          ...it, text, category: meta.category || it.category, title: meta.title || text,
          dueDate: meta.dueDate || null, amount: meta.amount != null ? meta.amount : null,
          type: meta.type || null, urgency: meta.urgency || 'baja',
        } : it));
        setEditBusy(false); setEditingId(null); setEditText('');
      }

      if (!loaded) return e('div', { className: 'flex items-center justify-center py-16 text-stone-400 text-sm gap-2' },
        e('span', { className: 'spin', style: { display: 'inline-block' } }, '⏳'), ' Abriendo tu bandeja...'
      );

      const today = startOfDay(new Date());
      const todayISO = toISODate(today);
      const inWeek = (d) => { const dd = new Date(d+'T00:00:00'); const diff = Math.round((dd - today) / 86400000); return diff >= 0 && diff <= 7; };
      const pending = items.filter(i => !i.done);
      const done = items.filter(i => i.done);
      const overdue = pending.filter(i => i.dueDate && i.dueDate < todayISO);
      const dueToday = pending.filter(i => i.dueDate === todayISO);
      const dueWeek = pending.filter(i => i.dueDate && inWeek(i.dueDate) && i.dueDate !== todayISO && i.dueDate >= todayISO);
      const finanzas = pending.filter(i => i.category === 'finanzas');
      const totalGastos = finanzas.filter(i => i.type !== 'ingreso').reduce((s, i) => s + (i.amount || 0), 0);
      const proximoPago = [...finanzas].filter(i => i.dueDate).sort((a, b) => a.dueDate.localeCompare(b.dueDate))[0];

      const filtered = pending.filter(i => {
        if (filter === 'todos') return true;
        if (filter === 'hoy') return i.dueDate === todayISO || overdue.includes(i);
        if (filter === 'atrasado') return overdue.includes(i);
        if (filter === 'semana') return dueWeek.includes(i) || i.dueDate === todayISO;
        if (filter === 'finanzas') return i.category === 'finanzas';
        return true;
      });
      const sorted = [...filtered].sort((a, b) => (a.dueDate || '9999').localeCompare(b.dueDate || '9999'));

      const hoyCount = dueToday.length + overdue.length;
      const digestParts = [`hoy ${hoyCount} pendiente${hoyCount === 1 ? '' : 's'}`];
      if (overdue.length) digestParts.push(`${overdue.length} atrasado${overdue.length === 1 ? '' : 's'}`);
      if (proximoPago) digestParts.push(`próximo pago: ${proximoPago.title}`);

      // Helper
      const cls = (...c) => c.filter(Boolean).join(' ');

      return e('div', { className: 'max-w-md mx-auto bg-stone-50 min-h-screen flex flex-col' },

        // Header
        e('div', { className: 'px-4 pt-8 pb-3' },
          e('h1', { className: 'text-2xl font-serif text-stone-800' }, 'Tu bandeja'),
          e('p', { className: 'text-sm text-stone-500 mt-0.5' }, 'Escribe lo que sea, aquí se acomoda solo')
        ),

        // Digest
        e('div', { className: 'px-4 mb-3' },
          e('div', { className: 'bg-stone-800 text-stone-50 rounded-2xl p-3.5 flex items-center gap-2.5' },
            e('span', { className: 'w-2 h-2 rounded-full bg-amber-400 shrink-0' }),
            e('p', { className: 'text-sm leading-snug font-mono' }, digestParts.join(' · '))
          )
        ),

        // Stats
        e('div', { className: 'px-4 grid grid-cols-2 gap-2 mb-3' },
          e('div', { className: 'bg-white rounded-2xl border border-stone-200 p-3' },
            e('p', { className: 'text-xs text-stone-400' }, 'Pendientes hoy'),
            e('p', { className: 'text-2xl font-mono text-stone-800 mt-1' }, hoyCount)
          ),
          e('div', { className: 'bg-white rounded-2xl border border-stone-200 p-3' },
            e('p', { className: 'text-xs text-stone-400' }, 'Gastos pendientes'),
            e('p', { className: 'text-2xl font-mono text-stone-800 mt-1' }, '$' + totalGastos.toLocaleString('es-MX'))
          )
        ),

        // Filters
        e('div', { className: 'px-4 flex gap-2 overflow-x-auto pb-2 mb-1' },
          ...[['todos','Todos'],['hoy','Hoy'],['atrasado','Atrasado'],['semana','Semana'],['finanzas','Finanzas']].map(([key, label]) =>
            e('button', {
              key,
              onClick: () => setFilter(key),
              className: cls('shrink-0 px-3 py-1.5 rounded-full text-sm border transition-colors',
                filter === key ? 'bg-stone-800 text-white border-stone-800' : 'bg-white text-stone-600 border-stone-200')
            }, label)
          )
        ),

        // List
        e('div', { className: 'flex-1 overflow-y-auto px-4 pb-28 pt-2 space-y-2' },
          sorted.length === 0 && e('p', { className: 'text-center text-stone-400 text-sm py-10' },
            'Tu bandeja está vacía. Escribe lo primero que se te ocurra ahí abajo.'
          ),
          ...sorted.map(item => {
            const cat = CATEGORIES[item.category] || CATEGORIES.personal;
            const isOverdue = overdue.includes(item);
            const isEditing = editingId === item.id;

            return e('div', { key: item.id, className: 'bg-white rounded-2xl border border-stone-200 p-3 flex items-start gap-3' },
              e('button', {
                onClick: () => toggleDone(item.id),
                className: 'mt-0.5 text-stone-300 hover:text-teal-600 transition-colors text-lg leading-none'
              }, '○'),

              isEditing
                ? e('div', { className: 'flex-1 min-w-0' },
                    e('input', {
                      autoFocus: true, value: editText,
                      onChange: ev => setEditText(ev.target.value),
                      onKeyDown: ev => { if (ev.key === 'Enter') saveEdit(item.id); if (ev.key === 'Escape') cancelEdit(); },
                      disabled: editBusy,
                      className: 'w-full bg-stone-100 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:ring-2 focus:ring-stone-300 disabled:opacity-50'
                    }),
                    e('div', { className: 'flex gap-3 mt-1.5' },
                      e('button', { onClick: () => saveEdit(item.id), disabled: editBusy, className: 'text-xs text-teal-700 flex items-center gap-1' },
                        editBusy ? '⏳' : '✓', ' Guardar'),
                      e('button', { onClick: cancelEdit, disabled: editBusy, className: 'text-xs text-stone-400' }, '✕ Cancelar')
                    )
                  )
                : e('div', { className: 'flex-1 min-w-0' },
                    e('p', { className: 'text-sm text-stone-800 leading-snug' }, item.title),
                    e('div', { className: 'flex flex-wrap gap-1.5 mt-1.5' },
                      e('span', { className: cls('text-xs px-2 py-0.5 rounded-full border', cat.chip) }, cat.emoji + ' ' + cat.label),
                      item.dueDate && e('span', {
                        className: cls('text-xs px-2 py-0.5 rounded-full border',
                          isOverdue ? 'bg-red-50 text-red-700 border-red-200' : 'bg-stone-100 text-stone-600 border-stone-200')
                      }, (isOverdue ? '⚠️ ' : '') + item.dueDate),
                      item.amount != null && e('span', { className: 'text-xs px-2 py-0.5 rounded-full border bg-amber-50 text-amber-700 border-amber-200' },
                        '$' + item.amount.toLocaleString('es-MX'))
                    )
                  ),

              !isEditing && e('div', { className: 'flex flex-col gap-2 mt-0.5' },
                e('button', { onClick: () => startEdit(item), className: 'text-stone-300 hover:text-stone-600 transition-colors text-sm' }, '✏️'),
                e('button', { onClick: () => removeItem(item.id), className: 'text-stone-300 hover:text-red-500 transition-colors text-sm' }, '🗑️')
              )
            );
          }),

          done.length > 0 && e('div', { className: 'pt-3' },
            e('button', { onClick: () => setShowDone(s => !s), className: 'text-xs text-stone-400 hover:text-stone-600' },
              (showDone ? 'Ocultar' : 'Ver') + ` completados (${done.length})`
            ),
            showDone && e('div', { className: 'space-y-2 mt-2' },
              ...done.map(item =>
                e('div', { key: item.id, className: 'bg-white/60 rounded-2xl border border-stone-100 p-3 flex items-center gap-3' },
                  e('button', { onClick: () => toggleDone(item.id), className: 'text-teal-500' }, '✅'),
                  e('p', { className: 'text-sm text-stone-400 line-through flex-1' }, item.title),
                  e('button', { onClick: () => removeItem(item.id), className: 'text-stone-300 hover:text-red-500' }, '🗑️')
                )
              )
            )
          )
        ),

        // Input bar
        e('div', {
          className: 'fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 p-3',
          style: { paddingBottom: 'max(12px, env(safe-area-inset-bottom))' }
        },
          e('div', { className: 'max-w-md mx-auto flex gap-2' },
            e('input', {
              ref: inputRef, value: input,
              onChange: ev => setInput(ev.target.value),
              onKeyDown: ev => ev.key === 'Enter' && addItem(),
              placeholder: 'Escribe lo que sea...',
              disabled: busy,
              className: 'flex-1 bg-stone-100 rounded-full px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-stone-300 disabled:opacity-50'
            }),
            e('button', {
              onClick: addItem, disabled: busy,
              className: 'bg-stone-800 text-white rounded-full w-10 h-10 flex items-center justify-center disabled:opacity-50 shrink-0 text-lg'
            }, busy ? '⏳' : '+')
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Bandeja/sw.js').catch(() => {});
      });
    }
  })();
  </script>
</body>
</html>
